<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><title>SAGOR BOT PANEL</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>

body{
margin:0;
font-family:Arial;
background:#120021;
color:white;
}

/* LOGIN */

#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:300px;
padding:40px;
background:#3f3f3f;
border-radius:20px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:30px;
background:#3f3f3f;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:30px;
background:#9333ea;
color:white;
cursor:pointer;
}

/* DASHBOARD */

#dashboard{
display:none;
}

header{
text-align:center;
padding:15px;
font-size:22px;
color:#c084fc;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
padding:10px;
}

.widget{
background:#1b0033;
padding:15px;
border-radius:10px;
text-align:center;
}

meter{
width:100%;
height:18px;
}

.terminal{
background:black;
padding:12px;
margin:10px;
height:230px;
overflow:auto;
font-size:13px;
border-radius:12px;
box-shadow:0 0 10px #9333ea inset;
}

</style></head><body><!-- LOGIN --><div id="loginPage"><div class="card"><h3>BOT LOGIN</h3><input type="password" id="pass" placeholder="Password"><button onclick="login()">Login</button>

<p id="msg"></p></div></div><!-- DASHBOARD --><div id="dashboard"><header>SAGOR BOT DASHBOARD</header><div class="grid"><div class="widget">
Commands
<p id="cmd"></p>
</div><div class="widget">
Events
<p id="evt"></p>
</div><div class="widget">
Ping
<p id="ping"></p>
</div><div class="widget">
Uptime
<p id="uptime"></p>
</div><div class="widget">
CPU
<meter id="cpuMeter" min="0" max="10"></meter>
<p id="cpuText"></p>
</div><div class="widget">
RAM
<meter id="ramMeter"></meter>
<p id="ramText"></p>
</div><div class="widget">
Activity
<p id="activity"></p>
</div></div><div style="padding:10px"><button onclick="startBot()">Start</button>
<button onclick="stopBot()">Stop</button>
<button onclick="restartBot()">Restart</button>

</div><canvas id="chart"></canvas>

<div class="terminal" id="logs"></div></div><script>

const PASSWORD="2255";

let autoScroll=true;

/* login */

function login(){

if(pass.value===PASSWORD){

loginPage.style.display="none";
dashboard.style.display="block";

loadStatus();
loadLogs();

}else{

msg.innerText="Wrong Password";

}

}

/* chart */

let cpuData=[];
let labels=[];

const chart=new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:labels,
datasets:[
{label:"CPU",data:cpuData,borderColor:"#c084fc"}
]
}

});

/* status */

async function loadStatus(){

const res=await fetch("/api/status");
const data=await res.json();

cmd.innerText=data.commandsCount;
evt.innerText=data.eventsCount;

ping.innerText=data.ping+" ms";
activity.innerText=data.activity;

cpuMeter.value=data.cpu;
ramMeter.value=data.ram;

cpuText.innerText=data.cpu+" %";
ramText.innerText=data.ram+" MB";

/* uptime */

let s=data.uptime;

let d=Math.floor(s/86400);
s%=86400;

let h=Math.floor(s/3600);
s%=3600;

let m=Math.floor(s/60);
s%=60;

uptime.innerText=`${d}d ${h}h ${m}m ${s}s`;

/* graph */

labels.push("");
cpuData.push(data.cpu);

if(labels.length>20){

labels.shift();
cpuData.shift();

}

chart.update();

}

/* logs */

const logBox=document.getElementById("logs");

logBox.addEventListener("scroll",()=>{

const nearBottom=
logBox.scrollHeight-logBox.scrollTop
<=logBox.clientHeight+5;

autoScroll=nearBottom;

});

async function loadLogs(){

const res=await fetch("/api/logs");

const data=await res.json();

data.forEach(l=>{

let div=document.createElement("div");

div.textContent=l;

div.style.color=`rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;

logBox.appendChild(div);

});

if(autoScroll)
logBox.scrollTop=logBox.scrollHeight;

}

/* controls */

function startBot(){ fetch("/api/start"); }
function stopBot(){ fetch("/api/stop"); }
function restartBot(){ fetch("/api/restart"); }

setInterval(loadStatus,3000);
setInterval(loadLogs,2000);

</script></body></html>
